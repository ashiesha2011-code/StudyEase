<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}

:root{
  --bg:#ffffff;--bg-alt:#f7f7f8;--border:rgba(0,0,0,.09);
  --text:#111827;--text-mid:#6b7280;--text-muted:#9ca3af;
  --hdr:#ffffff;--surface:#f3f4f6;
  --input-bg:#f9fafb;--input-border:rgba(0,0,0,.12);
  --accent:#3b82f6;
  --priv-bg:#fffbeb;--priv-text:#92400e;--priv-border:#fde68a;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#212121;--bg-alt:#171717;--border:rgba(255,255,255,.1);
    --text:#ececec;--text-mid:#a1a1aa;--text-muted:#71717a;
    --hdr:#212121;--surface:#2f2f2f;
    --input-bg:#2f2f2f;--input-border:rgba(255,255,255,.14);
    --priv-bg:#451a03;--priv-text:#fbbf24;--priv-border:#78350f;
  }
}
[data-theme="light"]{
  --bg:#ffffff;--bg-alt:#f7f7f8;--border:rgba(0,0,0,.09);
  --text:#111827;--text-mid:#6b7280;--text-muted:#9ca3af;
  --hdr:#ffffff;--surface:#f3f4f6;
  --input-bg:#f9fafb;--input-border:rgba(0,0,0,.12);
  --priv-bg:#fffbeb;--priv-text:#92400e;--priv-border:#fde68a;
}
[data-theme="dark"]{
  --bg:#212121;--bg-alt:#171717;--border:rgba(255,255,255,.1);
  --text:#ececec;--text-mid:#a1a1aa;--text-muted:#71717a;
  --hdr:#212121;--surface:#2f2f2f;
  --input-bg:#2f2f2f;--input-border:rgba(255,255,255,.14);
  --priv-bg:#451a03;--priv-text:#fbbf24;--priv-border:#78350f;
}

body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100dvh;overflow:hidden;
  transition:background .18s,color .18s;
}

/* ── App layout ── */
#app{display:flex;height:100dvh;overflow:hidden;}

/* ── Sidebar ── */
#sidebar{
  width:260px;flex-shrink:0;
  background:var(--bg-alt);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .22s cubic-bezier(.4,0,.2,1);
  z-index:300;
}
#sb-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#sb-logo{font-size:.88rem;font-weight:700;color:var(--text);}
#new-chat-btn{
  display:flex;align-items:center;gap:5px;padding:6px 11px;
  border-radius:8px;background:var(--accent);color:#fff;
  border:none;cursor:pointer;font-family:inherit;
  font-size:.78rem;font-weight:600;transition:filter .14s;white-space:nowrap;
}
#new-chat-btn:hover{filter:brightness(1.1);}

#conv-list{
  flex:1;overflow-y:auto;padding:6px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#conv-list::-webkit-scrollbar{width:4px;}
#conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.conv-group-label{
  font-size:.67rem;font-weight:600;color:var(--text-muted);
  letter-spacing:.07em;text-transform:uppercase;padding:12px 8px 5px;
}
.conv-item{
  padding:9px 10px;border-radius:8px;cursor:pointer;
  margin-bottom:1px;transition:background .12s;border:1px solid transparent;
}
.conv-item:hover{background:var(--surface);}
.conv-item.active{background:var(--surface);border-color:var(--border);}
.conv-title{
  font-size:.84rem;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;
}
.conv-row{display:flex;align-items:center;gap:6px;margin-top:3px;}
.conv-subj{
  font-size:.67rem;font-weight:600;color:var(--accent);
  background:rgba(59,130,246,.12);padding:1px 6px;border-radius:4px;flex-shrink:0;
}
.conv-time{font-size:.68rem;color:var(--text-muted);}
.conv-del{
  margin-left:auto;flex-shrink:0;width:22px;height:22px;border-radius:5px;
  border:none;background:transparent;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  color:var(--text-muted);transition:color .12s,background .12s;
}
.conv-item:hover .conv-del{display:flex;}
.conv-del:hover{color:#ef4444;background:rgba(239,68,68,.1);}


#sb-empty{
  text-align:center;padding:40px 16px;
  font-size:.82rem;color:var(--text-muted);line-height:1.6;
}

/* ── Mobile overlay ── */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
#sb-overlay.show{display:block;}

/* ── Main column ── */
#main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── Header ── */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:56px;background:var(--hdr);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;
}
.hdr-l{display:flex;align-items:center;gap:8px;}
#sb-toggle{
  display:none;width:34px;height:34px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;align-items:center;justify-content:center;color:var(--text-mid);
}
.back-btn{
  display:flex;align-items:center;gap:5px;text-decoration:none;
  padding:6px 10px;border-radius:8px;font-size:.82rem;font-weight:500;
  color:var(--text-mid);border:1px solid transparent;transition:all .14s;
}
.back-btn:hover{background:var(--surface);color:var(--text);border-color:var(--border);}
.hdr-title{font-size:.95rem;font-weight:700;color:var(--text);}
.hdr-r{display:flex;align-items:center;gap:8px;}

.priv-btn{
  display:flex;align-items:center;gap:5px;padding:6px 12px;
  border-radius:99px;border:1px solid var(--border);background:transparent;
  cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;
  color:var(--text-mid);transition:all .15s;
}
.priv-btn:hover{border-color:var(--accent);color:var(--accent);}
.priv-btn.on{background:var(--priv-bg);border-color:var(--priv-border);color:var(--priv-text);}

.theme-grp{
  display:flex;align-items:center;background:var(--surface);
  border:1px solid var(--border);border-radius:99px;padding:3px;gap:1px;
}
.tbtn{
  width:30px;height:28px;border-radius:99px;border:none;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-mid);transition:all .13s;
}
.tbtn.active{background:var(--text);color:var(--bg);}

/* ── Subject strip ── */
#subj-strip{
  display:flex;align-items:center;gap:6px;padding:10px 20px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;
}
#subj-strip::-webkit-scrollbar{display:none;}
.sp{
  padding:5px 14px;border-radius:99px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:inherit;
  font-size:.8rem;font-weight:600;color:var(--text-mid);
  white-space:nowrap;transition:all .14s;flex-shrink:0;
}
.sp:hover{border-color:var(--accent);color:var(--accent);}
.sp.active{background:var(--text);border-color:var(--text);color:var(--bg);}

/* ── Privacy bar ── */
#priv-bar{
  display:none;align-items:center;justify-content:center;gap:6px;
  padding:6px 20px;background:var(--priv-bg);
  border-bottom:1px solid var(--priv-border);
  font-size:.76rem;font-weight:600;color:var(--priv-text);flex-shrink:0;
}
#priv-bar.show{display:flex;}

/* ── View mode banner ── */
#view-banner{
  display:none;align-items:center;justify-content:center;gap:10px;
  padding:7px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);
  font-size:.78rem;color:var(--text-mid);flex-shrink:0;
}
#view-banner.show{display:flex;}
#view-new-btn{
  padding:4px 12px;border-radius:6px;background:var(--accent);color:#fff;
  border:none;font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;
}

/* ── Chat main ── */
#chat-main{flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.chat-inner{max-width:720px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;min-height:100%;}

/* ── Empty state ── */
#empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 0 32px;text-align:center;
}
.e-icon{
  width:60px;height:60px;border-radius:16px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;box-shadow:0 4px 20px rgba(59,130,246,.22);
}
.e-title{font-size:1.55rem;font-weight:700;color:var(--text);letter-spacing:-.025em;margin-bottom:6px;}
.e-sub{font-size:.9rem;color:var(--text-mid);margin-bottom:28px;}
.sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-width:460px;width:100%;}
.sc{
  padding:13px 16px;border:1px solid var(--border);border-radius:12px;
  background:var(--bg-alt);cursor:pointer;font-family:inherit;
  font-size:.84rem;font-weight:500;color:var(--text);text-align:left;
  line-height:1.4;transition:all .15s;
}
.sc:hover{border-color:var(--accent);color:var(--accent);background:var(--bg);}

/* ── Messages ── */
#msgs{padding:16px 0 12px;}
.mrow{display:flex;gap:10px;padding:8px 0;align-items:flex-start;}
.mrow--user{justify-content:flex-end;}
.m-av{
  width:30px;height:30px;border-radius:50%;background:var(--accent);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:.63rem;font-weight:700;flex-shrink:0;margin-top:2px;
}
.m-content{flex:1;min-width:0;}
.mrow--user .m-content{flex:0 1 auto;max-width:72%;}
.m-text{font-size:.95rem;line-height:1.72;color:var(--text);}
.m-bubble{
  display:inline-block;background:var(--accent);color:#fff;
  padding:10px 15px;border-radius:18px 18px 4px 18px;
  font-size:.93rem;line-height:1.65;word-break:break-word;
}
.m-actions{display:flex;gap:6px;margin-top:7px;opacity:0;transition:opacity .15s;}
.mrow:hover .m-actions{opacity:1;}
.copy-btn{
  display:flex;align-items:center;gap:4px;padding:4px 10px;
  border:1px solid var(--border);border-radius:99px;background:transparent;
  cursor:pointer;font-family:inherit;font-size:.72rem;font-weight:500;
  color:var(--text-muted);transition:all .13s;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{color:#10b981;border-color:#10b981;}

.t-row{display:flex;gap:10px;padding:8px 0;align-items:flex-start;}
.t-dots{display:flex;gap:4px;align-items:center;padding:8px 2px;}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:blink 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ── Input ── */
#input-area{flex-shrink:0;padding:12px 20px 16px;background:var(--bg);border-top:1px solid var(--border);}
.inp-inner{
  max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;
  background:var(--input-bg);border:1.5px solid var(--input-border);
  border-radius:14px;padding:10px 10px 10px 16px;transition:border-color .15s,box-shadow .15s;
}
.inp-inner:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
#inp{
  flex:1;border:none;background:transparent;font-family:inherit;
  font-size:.95rem;color:var(--text);resize:none;outline:none;
  max-height:160px;overflow-y:auto;line-height:1.55;scrollbar-width:thin;
}
#inp::placeholder{color:var(--text-muted);}
#inp:disabled{opacity:.5;cursor:not-allowed;}
#send-btn{
  width:36px;height:36px;border-radius:10px;background:var(--accent);
  border:none;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;align-self:flex-end;
}
#send-btn:hover:not(:disabled){filter:brightness(1.1);}
#send-btn:disabled{opacity:.35;cursor:not-allowed;}
.inp-hint{max-width:720px;margin:6px auto 0;font-size:.72rem;color:var(--text-muted);text-align:center;}

/* ── Loader ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s;}
#loader.gone{opacity:0;pointer-events:none;}
.l-mark{width:44px;height:44px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(.91)}}

/* ── Mobile ── */
@media(max-width:767px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #sb-toggle{display:flex!important;}
  .back-label{display:none;}
}
@media(max-width:580px){
  .sug-grid{grid-template-columns:1fr;}
  .e-title{font-size:1.3rem;}
  #hdr{padding:0 12px;}
  #subj-strip{padding:8px 12px;}
  #input-area{padding:10px 12px 14px;}
}
  </style>
</head>

        <textarea id="inp" placeholder="Ask a doubt…" rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
        </button>
      </div>
      <div class="inp-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var sb=window.supabase.createClient(
    'https://xiwrvbtryeesfgeydxnf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpd3J2YnRyeWVlc2ZnZXlkeG5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTQ0NDAsImV4cCI6MjA5NDU5MDQ0MH0.3Sp9dlc8cNsrzdHAGy74pCqscjL1MFV9ZWMW90QbhqE'
  );

  /* ── Auth ── */
  var currentUserId=null;
  sb.auth.onAuthStateChange(function(ev,session){
    if(ev==='SIGNED_OUT'||(ev==='INITIAL_SESSION'&&!session)){window.location.href='index.html';return;}
    if(session&&session.user){
      document.getElementById('loader').classList.add('gone');
      setTimeout(function(){document.getElementById('loader').style.display='none';},320);
      document.body.style.opacity='1';
      currentUserId=session.user.id;
      loadHistory();
      restoreFromDashboard();
    }
  });

  /* ── Theme ── */
  var curTheme=localStorage.getItem('se-ai-theme')||'device';
  setTheme(curTheme);
  document.querySelectorAll('.tbtn').forEach(function(b){
    b.addEventListener('click',function(){setTheme(b.dataset.t);});
  });
  function setTheme(t){
    curTheme=t;localStorage.setItem('se-ai-theme',t);
    if(t==='device')document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme',t);
    document.querySelectorAll('.tbtn').forEach(function(b){b.classList.toggle('active',b.dataset.t===t);});
  }

  /* ── Privacy ── */
  var privacy=false;
  document.getElementById('priv-btn').addEventListener('click',function(){
    privacy=!privacy;
    this.classList.toggle('on',privacy);
    document.getElementById('priv-bar').classList.toggle('show',privacy);
    document.getElementById('priv-label').textContent=privacy?'On':'Privacy';
  });

  /* ── Subject ── */
  var subject='';
  document.querySelectorAll('.sp').forEach(function(p){
    p.addEventListener('click',function(){
      document.querySelectorAll('.sp').forEach(function(x){x.classList.remove('active');});
      p.classList.add('active');subject=p.dataset.subj;
    });
  });

  /* ── Suggestions ── */
  document.querySelectorAll('.sc').forEach(function(c){
    c.addEventListener('click',function(){
      var i=document.getElementById('inp');
      i.value=c.dataset.q;i.dispatchEvent(new Event('input'));i.focus();
    });
  });

  /* ── Mobile sidebar ── */
  var sidebar=document.getElementById('sidebar');
  var overlay=document.getElementById('sb-overlay');
  function openSidebar(){sidebar.classList.add('open');overlay.classList.add('show');}
  function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('show');}
  document.getElementById('sb-toggle').addEventListener('click',function(){
    sidebar.classList.contains('open')?closeSidebar():openSidebar();
  });
  overlay.addEventListener('click',closeSidebar);

  /* ── New chat ── */
  document.getElementById('new-chat-btn').addEventListener('click',startNewChat);
  document.getElementById('view-new-btn').addEventListener('click',startNewChat);

  /* ── Clear all ── */

  /* ── Chat state ── */
  var chatHistory=[],busy=false,hasMessages=false,viewMode=false;
  var msgs=document.getElementById('msgs');
  var inp=document.getElementById('inp');
  var sendBtn=document.getElementById('send-btn');
  var emptyEl=document.getElementById('empty-state');

  inp.addEventListener('input',function(){
    if(viewMode)return;
    sendBtn.disabled=!inp.value.trim();
    inp.style.height='auto';
    inp.style.height=Math.min(inp.scrollHeight,160)+'px';
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  });
  sendBtn.addEventListener('click',send);

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function stripMd(t){
    return t.replace(/#{1,6}\s*/g,'').replace(/\*\*(.+?)\*\*/gs,'$1').replace(/\*(.+?)\*/gs,'$1')
      .replace(/__(.+?)__/gs,'$1').replace(/_(.+?)_/gs,'$1')
      .replace(/`([^`]+)`/g,'$1').replace(/^\s*[-*+]\s+/gm,'• ');
  }

  function startNewChat(){
    viewMode=false;chatHistory=[];hasMessages=false;
    msgs.innerHTML='';emptyEl.style.display='';
    inp.disabled=false;inp.value='';inp.style.height='auto';sendBtn.disabled=true;
    document.getElementById('view-banner').classList.remove('show');
    document.querySelectorAll('.conv-item').forEach(function(el){el.classList.remove('active');});
    closeSidebar();inp.focus();
  }

  function addUser(text){
    if(!hasMessages){emptyEl.style.display='none';hasMessages=true;}
    var row=document.createElement('div');row.className='mrow mrow--user';
    var content=document.createElement('div');content.className='m-content';
    var bubble=document.createElement('div');bubble.className='m-bubble';
    bubble.innerHTML=esc(text).replace(/\n/g,'<br>');
    content.appendChild(bubble);row.appendChild(content);msgs.appendChild(row);scrollBottom();
  }

  function addAI(text){
    var clean=stripMd(text);
    var row=document.createElement('div');row.className='mrow';
    var av=document.createElement('div');av.className='m-av';av.textContent='SE';
    var content=document.createElement('div');content.className='m-content';
    var textEl=document.createElement('div');textEl.className='m-text';
    textEl.innerHTML=esc(clean).replace(/\n/g,'<br>');
    var actions=document.createElement('div');actions.className='m-actions';
    var copyBtn=document.createElement('button');copyBtn.className='copy-btn';
    copyBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg> Copy';
    copyBtn.addEventListener('click',function(){
      navigator.clipboard.writeText(clean).then(function(){
        copyBtn.className='copy-btn copied';copyBtn.textContent='Copied!';
        setTimeout(function(){
          copyBtn.className='copy-btn';
          copyBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg> Copy';
        },1800);
      });
    });
    actions.appendChild(copyBtn);
    content.appendChild(textEl);content.appendChild(actions);
    row.appendChild(av);row.appendChild(content);msgs.appendChild(row);scrollBottom();
  }

  function addTyping(){
    var row=document.createElement('div');row.className='t-row';row.id='typing-row';
    var av=document.createElement('div');av.className='m-av';av.textContent='SE';
    var dots=document.createElement('div');dots.className='t-dots';
    dots.innerHTML='<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
    row.appendChild(av);row.appendChild(dots);msgs.appendChild(row);scrollBottom();
  }

  function send(){
    if(viewMode)return;
    var t=inp.value.trim();if(!t||busy)return;
    busy=true;sendBtn.disabled=true;
    var msg=subject?'['+subject+'] '+t:t;
    addUser(t);inp.value='';inp.style.height='auto';addTyping();
    fetch('https://xiwrvbtryeesfgeydxnf.supabase.co/functions/v1/ai-chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,history:privacy?[]:chatHistory})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var el=document.getElementById('typing-row');if(el)el.remove();
      var reply=d.reply||'Sorry, something went wrong.';
      addAI(reply);
      if(!privacy&&currentUserId){
        sb.from('chat_history').insert({user_id:currentUserId,user_message:t,ai_reply:reply,subject:subject||'General'})
          .then(function(r){if(!r.error)loadHistory();});
        chatHistory.push({role:'user',content:msg});
        chatHistory.push({role:'assistant',content:reply});
        if(chatHistory.length>20)chatHistory=chatHistory.slice(-20);
      }
    })
    .catch(function(){
      var el=document.getElementById('typing-row');if(el)el.remove();
      addAI('Network error — please check your connection.');
    })
    .finally(function(){busy=false;if(!viewMode)sendBtn.disabled=!inp.value.trim();});
  }

  function scrollBottom(){document.getElementById('chat-main').scrollTop=9999999;}

  /* ── Sidebar / History ── */
  function groupConversations(rows){
    var convs=[],current=null,GAP=60*60*1000;
    rows.forEach(function(row){
      var t=new Date(row.created_at).getTime();
      if(!current||t-current.lastTime>GAP){
        current={title:row.user_message,subject:row.subject,startTime:new Date(row.created_at),lastTime:t,messages:[]};
        convs.push(current);
      }
      current.messages.push(row);current.lastTime=t;
    });
    return convs.reverse();
  }

  function dayLabel(date){
    var now=new Date(),d=new Date(date);
    var diff=Math.floor((now-d)/86400000);
    if(diff===0)return'Today';
    if(diff===1)return'Yesterday';
    if(diff<7)return d.toLocaleDateString('en-IN',{weekday:'long'});
    return d.toLocaleDateString('en-IN',{month:'short',day:'numeric'});
  }

  function renderSidebar(convs){
    var list=document.getElementById('conv-list');
    list.innerHTML='';
    if(!convs.length){
      list.innerHTML='<div id="sb-empty">Start a conversation to see your history here</div>';
      return;
    }
    var lastLabel='';
    convs.forEach(function(conv){
      var label=dayLabel(conv.startTime);
      if(label!==lastLabel){
        var g=document.createElement('div');g.className='conv-group-label';g.textContent=label;
        list.appendChild(g);lastLabel=label;
      }
      var item=document.createElement('div');item.className='conv-item';
      var titleEl=document.createElement('div');titleEl.className='conv-title';
      titleEl.textContent=conv.title.length>44?conv.title.slice(0,44)+'…':conv.title;
      var row=document.createElement('div');row.className='conv-row';
      if(conv.subject&&conv.subject!=='General'){
        var subjEl=document.createElement('span');subjEl.className='conv-subj';subjEl.textContent=conv.subject;
        row.appendChild(subjEl);
      }
      var timeEl=document.createElement('span');timeEl.className='conv-time';
      timeEl.textContent=new Date(conv.startTime).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      row.appendChild(timeEl);
      var delBtn=document.createElement('button');delBtn.className='conv-del';delBtn.title='Delete';
      delBtn.innerHTML='<svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clip-rule="evenodd"/></svg>';
      delBtn.addEventListener('click',function(e){
        e.stopPropagation();
        var ids=conv.messages.map(function(m){return m.id;});
        sb.from('chat_history').delete().in('id',ids).then(function(r){
          if(!r.error){if(viewMode&&item.classList.contains('active'))startNewChat();loadHistory();}
        });
      });
      row.appendChild(delBtn);
      item.appendChild(titleEl);item.appendChild(row);
      item.addEventListener('click',function(){openConversation(conv,item);});
      list.appendChild(item);
    });
  }

  function openConversation(conv,itemEl){
    viewMode=true;msgs.innerHTML='';
    emptyEl.style.display='none';hasMessages=true;
    inp.disabled=true;sendBtn.disabled=true;inp.value='';
    document.querySelectorAll('.conv-item').forEach(function(el){el.classList.remove('active');});
    if(itemEl)itemEl.classList.add('active');
    document.getElementById('view-banner-text').textContent=
      'Past conversation · '+new Date(conv.startTime).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    document.getElementById('view-banner').classList.add('show');
    conv.messages.forEach(function(entry){
      var urow=document.createElement('div');urow.className='mrow mrow--user';
      var ucontent=document.createElement('div');ucontent.className='m-content';
      var ububble=document.createElement('div');ububble.className='m-bubble';
      ububble.innerHTML=esc(entry.user_message).replace(/\n/g,'<br>');
      ucontent.appendChild(ububble);urow.appendChild(ucontent);msgs.appendChild(urow);
      var arow=document.createElement('div');arow.className='mrow';
      var aav=document.createElement('div');aav.className='m-av';aav.textContent='SE';
      var acontent=document.createElement('div');acontent.className='m-content';
      var atxt=document.createElement('div');atxt.className='m-text';
      atxt.innerHTML=esc(stripMd(entry.ai_reply)).replace(/\n/g,'<br>');
      acontent.appendChild(atxt);arow.appendChild(aav);arow.appendChild(acontent);msgs.appendChild(arow);
    });
    scrollBottom();closeSidebar();
  }

  function restoreFromDashboard(){
    var raw=sessionStorage.getItem('se_dash_conv');
    if(!raw)return;
    sessionStorage.removeItem('se_dash_conv');
    try{
      var conv=JSON.parse(raw);
      if(!conv.chatHistory||!conv.chatHistory.length)return;
      chatHistory=conv.chatHistory;
      emptyEl.style.display='none';hasMessages=true;
      conv.displayMessages.forEach(function(m){
        if(m.role==='user')addUser(m.text);
        else addAI(m.text);
      });
    }catch(e){}
  }

  function loadHistory(){
    if(!currentUserId)return;
    sb.from('chat_history')
      .select('id,user_message,ai_reply,subject,created_at')
      .eq('user_id',currentUserId)
      .order('created_at',{ascending:true})
      .limit(200)
      .then(function(res){
        if(res.error){console.error('[History error]',res.error);return;}
        renderSidebar(groupConversations(res.data||[]));
      })
      .catch(function(err){console.error('[History error]',err);});
  }
})();
</script>
</body>
</html>
