<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breathing Exercise — StudyEase</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230A1628'/><text y='22' x='6' font-size='18' font-family='system-ui' font-weight='700' fill='%233B82F6'>S</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;font-family:'DM Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
body{
  background:linear-gradient(145deg,#E8F4FD 0%,#EAF7F0 50%,#F0FDF4 100%);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;color:#1E293B;
}

/* Back link */
.back-link{
  position:fixed;top:20px;left:24px;
  display:flex;align-items:center;gap:6px;
  font-size:.84rem;font-weight:600;color:#64748B;
  text-decoration:none;transition:color .15s;z-index:10;
}
.back-link:hover{color:#0A1628}
.back-link svg{flex-shrink:0}

/* Session counter */
.session-badge{
  position:fixed;top:20px;right:24px;
  background:rgba(255,255,255,.7);backdrop-filter:blur(8px);
  border:1px solid rgba(20,184,166,.25);border-radius:99px;
  padding:6px 14px;font-size:.78rem;font-weight:600;color:#0F766E;
  z-index:10;
}

/* Main layout */
.page{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 24px 40px;width:100%;max-width:520px;
  gap:0;
}

/* Mode picker */
.mode-row{
  display:flex;gap:8px;margin-bottom:36px;flex-wrap:wrap;justify-content:center;
}
.mode-btn{
  padding:8px 18px;border-radius:99px;
  border:1.5px solid rgba(20,184,166,.3);
  background:rgba(255,255,255,.55);backdrop-filter:blur(6px);
  font-family:inherit;font-size:.83rem;font-weight:600;
  color:#475569;cursor:pointer;transition:all .18s;
}
.mode-btn:hover{border-color:#14B8A6;color:#0F766E;}
.mode-btn.active{background:#14B8A6;border-color:#14B8A6;color:white;}

/* Breathing circle */
.circle-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
}
.circle-outer{
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,210,190,.25) 0%,rgba(147,197,253,.12) 60%,transparent 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.circle-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(20,184,166,.2);
}
.circle-main{
  width:160px;height:160px;border-radius:50%;
  background:linear-gradient(135deg,rgba(99,210,190,.55) 0%,rgba(147,197,253,.55) 100%);
  box-shadow:0 0 40px rgba(99,210,190,.3),0 0 80px rgba(147,197,253,.15);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;
  transition:transform .1s linear;
}
.circle-main.animating{transition:none}

.breath-label{
  font-size:1.05rem;font-weight:700;color:#0F766E;
  letter-spacing:.01em;text-align:center;line-height:1.3;
}
.breath-count{
  font-size:2rem;font-weight:700;color:#0F766E;opacity:.85;line-height:1;
}

/* Phase progress ring (decorative) */
.phase-ring{
  position:absolute;inset:-12px;border-radius:50%;
  border:3px solid transparent;
  border-top-color:rgba(20,184,166,.5);
  transition:transform .1s linear;
}

/* Timer + controls */
.timer-row{
  display:flex;align-items:center;gap:10px;margin-bottom:24px;
}
.timer-display{
  font-size:1.6rem;font-weight:700;color:#0F766E;letter-spacing:-.02em;min-width:80px;text-align:center;
}
.timer-sep{color:#94A3B8;font-size:.8rem;font-weight:500}
.duration-btns{display:flex;gap:6px;}
.dur-btn{
  padding:5px 12px;border-radius:99px;
  border:1.5px solid rgba(20,184,166,.3);
  background:rgba(255,255,255,.5);font-family:inherit;
  font-size:.78rem;font-weight:600;color:#475569;cursor:pointer;transition:all .15s;
}
.dur-btn:hover{border-color:#14B8A6;color:#0F766E}
.dur-btn.active{background:#14B8A6;border-color:#14B8A6;color:white}

/* Start/stop button */
.start-btn{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#14B8A6,#3B82F6);
  border:none;cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(20,184,166,.35);
  transition:transform .15s,box-shadow .15s;font-size:1.5rem;
}
.start-btn:hover{transform:scale(1.06);box-shadow:0 6px 32px rgba(20,184,166,.45);}
.start-btn:active{transform:scale(.97)}

/* Mode description */
.mode-desc{
  text-align:center;font-size:.82rem;color:#64748B;line-height:1.6;
  max-width:320px;margin-top:18px;
}

/* Cycle count */
.cycle-row{
  margin-top:14px;font-size:.78rem;color:#94A3B8;font-weight:500;text-align:center;
}

/* Calm pulse rings (ambient) */
.pulse-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(20,184,166,.15);
  animation:pulse-out 3s ease-out infinite;
  pointer-events:none;
}
.pulse-ring:nth-child(2){animation-delay:1s}
.pulse-ring:nth-child(3){animation-delay:2s}
@keyframes pulse-out{
  0%{transform:scale(1);opacity:.6}
  100%{transform:scale(1.5);opacity:0}
}

@media(max-width:480px){
  .circle-outer{width:180px;height:180px}
  .circle-main{width:130px;height:130px}
  .breath-count{font-size:1.6rem}
  .timer-display{font-size:1.3rem}
}
  </style>
</head>
<body>

<a href="dashboard.html" class="back-link">
  <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
  Back to StudyEase
</a>

<div class="session-badge" id="session-badge">0 sessions today</div>

<div class="page">

  <!-- Mode picker -->
  <div class="mode-row">
    <button class="mode-btn active" data-mode="box" onclick="setMode('box',this)">Box Breathing</button>
    <button class="mode-btn" data-mode="478" onclick="setMode('478',this)">4-7-8</button>
    <button class="mode-btn" data-mode="simple" onclick="setMode('simple',this)">Simple Deep Breath</button>
  </div>

  <!-- Circle -->
  <div class="circle-wrap">
    <div class="circle-outer">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="circle-ring"></div>
      <div class="circle-main" id="circle">
        <div class="breath-label" id="breath-label">Ready</div>
        <div class="breath-count" id="breath-count">–</div>
      </div>
    </div>
  </div>

  <!-- Timer + duration -->
  <div class="timer-row">
    <div class="timer-display" id="timer-display">0:00</div>
    <span class="timer-sep">of</span>
    <div class="duration-btns">
      <button class="dur-btn active" data-dur="120" onclick="setDuration(120,this)">2 min</button>
      <button class="dur-btn" data-dur="300" onclick="setDuration(300,this)">5 min</button>
      <button class="dur-btn" data-dur="600" onclick="setDuration(600,this)">10 min</button>
    </div>
  </div>

  <!-- Start button -->
  <button class="start-btn" id="start-btn" onclick="toggleSession()">
    <svg id="start-icon" width="24" height="24" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
  </button>

  <div class="cycle-row" id="cycle-row"></div>
  <div class="mode-desc" id="mode-desc">Inhale 4s · Hold 4s · Exhale 4s · Hold 4s</div>

</div>

<script>
(function(){

var MODES={
  box:   {phases:['Breathe in','Hold','Breathe out','Hold'],times:[4,4,4,4],desc:'Inhale 4s · Hold 4s · Exhale 4s · Hold 4s'},
  '478': {phases:['Breathe in','Hold','Breathe out'],        times:[4,7,8],  desc:'Inhale 4s · Hold 7s · Exhale 8s — calms the nervous system'},
  simple:{phases:['Breathe in','Hold','Breathe out'],        times:[4,4,8],  desc:'Inhale 4s · Hold 4s · Exhale 8s — slow and steady'},
};

var currentMode='box';
var targetDuration=120;
var running=false;
var elapsed=0,phaseTime=0,phaseIdx=0,cycleCount=0;
var timerInt=null,countInt=null;
var MAX_SCALE=1.22,MIN_SCALE=0.82;

/* ── Audio (Web Audio API — no files needed) ── */
var audioCtx=null;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq,dur,vol,type){
  try{
    var ctx=getCtx();
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type||'sine';
    o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol,ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}
/* Phase-start chime: rising for inhale, neutral for hold, falling for exhale */
function chimePhase(phase){
  if(phase==='Breathe in')  { playTone(523,.35,.18); setTimeout(function(){playTone(659,.3,.14)},120); }
  else if(phase==='Hold')   { playTone(440,.3,.12); }
  else if(phase==='Breathe out'){ playTone(494,.35,.16); setTimeout(function(){playTone(392,.4,.12)},140); }
}
/* Countdown beep: 3 = low, 2 = mid, 1 = high */
var BEEP_FREQS={3:330,2:392,1:523};
function beepCount(n){
  if(n>=1&&n<=3) playTone(BEEP_FREQS[n],.18,.22,'triangle');
}

/* LocalStorage */
var TODAY=new Date().toDateString();
var stored=JSON.parse(localStorage.getItem('se_breath')||'{}');
if(stored.date!==TODAY){stored={date:TODAY,sessions:0};}
updateBadge();

function updateBadge(){
  var s=stored.sessions||0;
  document.getElementById('session-badge').textContent=s===0?'0 sessions today':s+' session'+(s!==1?'s':'')+' today';
}

window.setMode=function(m,btn){
  if(running)return;
  currentMode=m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('mode-desc').textContent=MODES[m].desc;
  resetCircle();
};

window.setDuration=function(d,btn){
  targetDuration=d;
  document.querySelectorAll('.dur-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
};

window.toggleSession=function(){
  running?stopSession():startSession();
};

function startSession(){
  running=true;elapsed=0;phaseIdx=0;phaseTime=0;cycleCount=0;
  document.getElementById('start-icon').innerHTML='<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>';
  renderPhase();
  timerInt=setInterval(tick,1000);
}

function stopSession(){
  running=false;
  clearInterval(timerInt);clearInterval(countInt);
  stored.sessions=(stored.sessions||0)+1;
  localStorage.setItem('se_breath',JSON.stringify(stored));
  updateBadge();
  document.getElementById('start-icon').innerHTML='<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>';
  resetCircle();
  document.getElementById('cycle-row').textContent=cycleCount?'Completed '+cycleCount+' cycle'+(cycleCount!==1?'s':''):'';
}

function tick(){
  elapsed++;phaseTime++;
  updateTimerDisplay();
  var mode=MODES[currentMode];
  var phDuration=mode.times[phaseIdx];
  var remaining=phDuration-phaseTime;
  document.getElementById('breath-count').textContent=remaining>0?remaining:'';
  animateCircle();
  /* Countdown beeps for last 3 seconds of each phase */
  if(remaining>=1&&remaining<=3) beepCount(remaining);
  if(phaseTime>=phDuration){
    phaseIdx=(phaseIdx+1)%mode.phases.length;
    if(phaseIdx===0)cycleCount++;
    phaseTime=0;
    renderPhase();
  }
  if(elapsed>=targetDuration)stopSession();
}

function renderPhase(){
  var mode=MODES[currentMode];
  var label=mode.phases[phaseIdx];
  var dur=mode.times[phaseIdx];
  document.getElementById('breath-label').textContent=label;
  document.getElementById('breath-count').textContent=dur;
  document.getElementById('cycle-row').textContent=cycleCount?'Cycle '+cycleCount:'';
  animateCircle();
  chimePhase(label);
}

function animateCircle(){
  var mode=MODES[currentMode];
  var phase=mode.phases[phaseIdx];
  var dur=mode.times[phaseIdx];
  var pct=phaseTime/dur;
  var scale;
  if(phase==='Breathe in')  scale=MIN_SCALE+(MAX_SCALE-MIN_SCALE)*pct;
  else if(phase==='Breathe out') scale=MAX_SCALE-(MAX_SCALE-MIN_SCALE)*pct;
  else if(phase==='Hold'&&phaseIdx===1) scale=MAX_SCALE;
  else scale=MIN_SCALE;
  document.getElementById('circle').style.transform='scale('+scale+')';
}

function resetCircle(){
  document.getElementById('breath-label').textContent='Ready';
  document.getElementById('breath-count').textContent='–';
  document.getElementById('circle').style.transform='scale(1)';
  document.getElementById('timer-display').textContent='0:00';
}

function updateTimerDisplay(){
  var m=Math.floor(elapsed/60),s=elapsed%60;
  document.getElementById('timer-display').textContent=m+':'+(s<10?'0':'')+s;
}

/* Init desc */
document.getElementById('mode-desc').textContent=MODES[currentMode].desc;

})();
</script>
</body>
</html>
